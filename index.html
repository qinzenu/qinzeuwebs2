    .glass-effect {

        overflow: hidden; 
        margin-bottom: 30px;
    }
    
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    th {

        color: #fff; 
        padding: 15px 10px; 
        text-align: left; 
        font-size: 0.7rem; 
        text-transform: uppercase;

    const LoadingManager = {
        interval: null,
        start: function(textId, containerId) {
            const textElement = document.getElementById(textId);
            const container = document.getElementById(containerId);
            const tableBody = document.getElementById('tableBody');
            if (!textElement || !container) return;
            
            tableBody.innerHTML = ''; 
            document.getElementById('total').innerText = '0';
            document.getElementById('tHadir').innerText = '0';
            document.getElementById('tIzin').innerText = '0';
            
            container.style.display = 'flex'; 
            let dots = 0;
            if (this.interval) clearInterval(this.interval); 
            this.interval = setInterval(() => {
                dots = (dots % 3) + 1; 
                textElement.innerText = "Mencari data" + ".".repeat(dots);
            }, 400);
        },
        stop: function(containerId) {
            if (this.interval) { clearInterval(this.interval); this.interval = null; }
            const container = document.getElementById(containerId);
            if (container) container.style.display = 'none';
        },
        error: function(textId) {

    async function renderManualMembers() {
    isFetching = true;
    const containerId = 'loading';
    const tableBody = document.getElementById('tableBody');
    const startTime = Date.now();

    LoadingManager.start('loading-text', containerId);

    try {
        const response = await fetch(`${csvUrl}&v=${Date.now()}`);
        const text = await response.text();
        const rows = text.split(/\r?\n/).slice(1);
        const now = new Date();
        const f1 = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
        const f2 = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;

        let countToday = 0;
        rows.forEach(row => {
            const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (c[0]) {
                const dateOnly = c[0].replace(/"/g, '').split(' ')[0];
                if (dateOnly === f1 || dateOnly === f2) countToday++;
            }
        });

        let html = '';
    manualMembers.forEach((m, index) => {
        html += `<tr>
            <td style="text-align: center; vertical-align: middle; width: 50px;">
                <span class="hour-text" style="color: #ff3131; font-weight: 800; display: block; width: 100%;">${index + 1}</span>
            </td>
            <td style="text-align: left;">
                <span class="name-text" style="font-weight: 600; white-space: nowrap;">${m.nama}</span>
            </td>
            <td style="text-align: right; padding-right: 15px;">
                <span class="badge" style="border: 1px solid #ff3131; color: white; background: rgba(255,49,49,0.1); padding: 5px 10px; border-radius: 4px; font-size: 8px; font-weight: bold; display: inline-block; white-space: nowrap; min-width: 65px; text-align: center;">
                    ${m.jabatan}
                </span>
            </td>
        </tr>`;
    });

        setTimeout(() => {
            tableBody.innerHTML = html;
            document.getElementById('total').innerText = manualMembers.length;
            document.getElementById('tHadir').innerText = countToday;
            LoadingManager.stop(containerId);
            isFetching = false;
        }, Math.max(0, 600 - (Date.now() - startTime)));

    } catch (e) {
        LoadingManager.error('loading-text');
        isFetching = false;
    }
}
    async function fetchData(isManual = false) {
        if (filterType === 'members') return;
        if (isFetching && !isManual) return;
        isFetching = true;

        const containerId = 'loading';
        const tableBody = document.getElementById('tableBody');
        const startTime = Date.now();

        LoadingManager.start('loading-text', containerId);

        try {
            const response = await fetch(`${csvUrl}&v=${Date.now()}`);
            if (!response.ok) throw new Error('Network error');
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1).filter(r => r.trim() !== "" && r.replace(/,/g, '').trim() !== "").reverse();
            
            const now = new Date();
            const format1 = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            const format2 = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;

            let html = '', h = 0, i = 0, t = 0;

            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (!c[0] || !c[1] || c.length < 5) return;

                const timestampFull = c[0]; 
                const parts = timestampFull.split(' ');
                const dateOnly = parts[0];
                
                // KODE BARU (Jam:Menit:Detik)
let timeOnly = "--:--:--";
if (parts[1]) {
    let rawTime = parts[1].trim();
    
    // Menambahkan '0' di depan jika formatnya H:mm:ss menjadi HH:mm:ss
    if (rawTime.indexOf(':') === 1) rawTime = '0' + rawTime;
    
    // Mengambil Jam, Menit, dan Detik (HH:mm:ss)
    // substring(0, 8) mengambil 8 karakter pertama
    timeOnly = rawTime.substring(0, 8); 
}
                
                const isToday = (dateOnly === format1 || dateOnly === format2);
                if (filterType === 'today' && !isToday) return;

                const status = c[4] || "Hadir";
                const isIzin = status.toLowerCase() === 'izin';
                
                t++;
                if (isIzin) i++; else h++;

                html += `<tr>
                    <td>
                        <div class="time-wrapper">
                            <span class="hour-text">${timeOnly}</span>
                            <span class="date-text">${dateOnly}</span>
                        </div>
                    </td>
                    <td><span class="name-text">${c[1]}</span></td>
                    <td style="text-align:right;">
                        <span class="badge ${isIzin ? 'bg-izin' : 'bg-hadir'}">${status}</span>
                    </td>
                </tr>`;
            });

            setTimeout(() => {
                tableBody.innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding:30px; color:#aaa;">Belum ada data.</td></tr>';
                document.getElementById('total').innerText = t;
                document.getElementById('tHadir').innerText = h;
                document.getElementById('tIzin').innerText = i;
                document.getElementById('tHadir').style.color = "#4ade80";
                document.getElementById('tIzin').style.color = "#fde047";
                LoadingManager.stop(containerId);
                isFetching = false;
            }, Math.max(0, 800 - (Date.now() - startTime)));

        } catch (e) {
            LoadingManager.error('loading-text');
            isFetching = false;
        }
    }

    document.addEventListener('DOMContentLoaded', fetchData);
    setInterval(() => { if (!isFetching && filterType !== 'members') fetchData(); }, 15000);
</script>
 <script>
        const updatePopup = document.getElementById("updatePopup");
        const closeUpdate = document.getElementById("closeUpdate");

        // VERSION UPDATE → GANTI INI SETIAP ADA UPDATE BARU
        const UPDATE_VERSION = "v0.0.5";

        // cek apakah sudah pernah ditutup
        if (localStorage.getItem("update_seen") !== UPDATE_VERSION) {
            setTimeout(() => {
                updatePopup.style.display = "flex";
            }, 800);
        }

        // tombol close
        closeUpdate.addEventListener("click", () => {
            updatePopup.style.display = "none";
            localStorage.setItem("update_seen", UPDATE_VERSION);
        });

        // klik luar box = tutup
        updatePopup.addEventListener("click", (e) => {
            if (e.target === updatePopup) {
                updatePopup.style.display = "none";
                localStorage.setItem("update_seen", UPDATE_VERSION);
            }
        });
    </script>
</body>
