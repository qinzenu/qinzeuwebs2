<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Absensi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
   <style>
    /* --- UPDATE CSS: FIX GLASSMORPHISM EFFECT --- */
    :root { 
        --primary: #ff3131; 
        /* Overlay ditingkatkan agar foto tidak terlalu terang dan teks terbaca */
        --bg-overlay: rgba(0, 0, 0, 0.5); 
        --glass: rgba(255, 255, 255, 0.1); 
        /* Glass heavy disetel ke 0.4 - 0.6 agar efek blur punya "badan" */
        --glass-heavy: rgba(30, 30, 30, 0.55); 
        --border: rgba(255, 49, 49, 0.4); 
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -webkit-font-smoothing: antialiased;
}

    body { 
        margin: 0; 
        padding: 15px; 
        color: white; 
        font-family: 'Poppins', sans-serif;
        /* Gunakan linear-gradient untuk menggelapkan foto latar */
        background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                    url('./vd/fotolivexjj.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
    }
    
    .container { max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }
    
    header { text-align: center; margin-bottom: 25px; }
    
    .brand-icon {
        width: 70px; height: 70px;
        object-fit: cover;
        border-radius: 18px; 
        border: 2px solid var(--border);
        margin-bottom: 12px;
        background: #111;
        box-shadow: 0 0 20px rgba(255, 49, 49, 0.3);
    }
    
    /* PENTING: Backdrop-filter membutuhkan background-color agar bekerja maksimal */
    .glass-effect {
        background-color: var(--glass-heavy) !important;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .filter-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
    
    .btn { 
        background: rgba(0, 0, 0, 0.3); 
        border: 1px solid var(--border); 
        color: #ddd; 
        padding: 10px 22px; 
        border-radius: 20px; 
        cursor: pointer; 
        font-size: 0.75rem; 
        font-weight: 700;
        transition: 0.3s;
        text-transform: uppercase;
        backdrop-filter: blur(5px);
    }

    .btn.active { 
        background: var(--primary); 
        color: white; 
        border-color: var(--primary); 
        box-shadow: 0 5px 15px rgba(255,49,49,0.4); 
    }
    
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    
    .card { 
        padding: 15px 5px; 
        border-radius: 15px; 
        text-align: center; 
    }
    
    .card h3 { font-size: 0.6rem; color: #eee; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
    .card p { font-size: 1.4rem; font-weight: 700; margin: 0; }
    
    .table-wrap { 
        border-radius: 18px; 
        overflow: hidden; 
        margin-bottom: 30px;
    }
    
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    th { 
        background: rgba(255, 49, 49, 0.25); 
        color: #fff; 
        padding: 15px 10px; 
        text-align: left; 
        font-size: 0.7rem; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
    }

    td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; vertical-align: middle; }
    
    th:nth-child(1), td:nth-child(1) { width: 100px; } 
    th:nth-child(2), td:nth-child(2) { width: auto; } 
    th:nth-child(3), td:nth-child(3) { width: 85px; text-align: right; }

    .time-wrapper { display: flex; flex-direction: column; }
    .date-text { color: #ccc; font-size: 0.6rem; }
    .hour-text { color: var(--primary); font-size: 0.75rem; font-weight: 700; }

    .name-text { color: #fff; font-weight: 600; line-height: 1.2; word-break: break-word; }

    .badge { 
        padding: 4px 8px; 
        border-radius: 8px; 
        font-size: 0.55rem; 
        font-weight: 800; 
        text-transform: uppercase; 
        display: inline-block; 
    }
    
    .bg-hadir { background: rgba(34,197,94,0.3); color: #4ade80; border: 1px solid rgba(34,197,94,0.5); }
    .bg-izin { background: rgba(250,204,21,0.3); color: #fde047; border: 1px solid rgba(250,204,21,0.5); }

    /* LOADER */
    .loader {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 50px 20px;
        gap: 15px;
    }

    .spinner {
        width: 35px; height: 35px;
        border: 3px solid rgba(255, 49, 49, 0.1);
        border-top: 3px solid var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    #loading-text {
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        min-width: 160px;
        text-align: center;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    tr:hover td { background: rgba(255, 255, 255, 0.1); transition: 0.2s; }
</style>
</head>
<body>

<div class="container">
    <header>
        <img src="./vd/icon.png" alt="NF Logo" class="brand-icon">
        <h2 style="color: var(--primary); margin:0; letter-spacing: -1px; text-transform: uppercase; font-weight: 800;">NewbieFams Absensi</h2>
        <p style="font-size: 0.7rem; color: #bbb; margin-top: 4px;">Data Absen Member Newbie Fams</p>
    </header>

    <div class="filter-nav">
        <button id="btnToday" class="btn active" onclick="setFilter('today')">HARI INI</button>
        <button id="btnAll" class="btn" onclick="setFilter('all')">SEMUA</button>
    </div>

    <div class="stats">
        <div class="card glass-effect">
            <h3>Total Absen</h3>
            <p id="total">0</p>
        </div>
        <div class="card glass-effect">
            <h3>Total Hadir</h3>
            <p id="tHadir" style="color:#4ade80">0</p>
        </div>
        <div class="card glass-effect">
            <h3>Total Izin</h3>
            <p id="tIzin" style="color:#fde047">0</p>
        </div>
    </div>

    <div class="table-wrap glass-effect">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Waktu Absen</th>
                    <th>Nama Member</th>
                    <th style="text-align:right;">Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <div id="loading" class="loader">
            <div class="spinner"></div>
            <span id="loading-text">Mencari data</span>
        </div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxUK5bAyaQ0zDPb6a54KwQEmYAcucCX6pizMfxQA3p8XEs1C-OABtOlVi3dapwmSFzzJkr4kN6Wei/pub?gid=1525581949&single=true&output=csv';
    let filterType = 'today';
    let isFetching = false; 

    const LoadingManager = {
        interval: null,
        start: function(textId, containerId) {
            const textElement = document.getElementById(textId);
            const container = document.getElementById(containerId);
            const tableBody = document.getElementById('tableBody');
            
            if (!textElement || !container) return;

            tableBody.innerHTML = ''; 

            const totalEl = document.getElementById('total');
            const hadirEl = document.getElementById('tHadir');
            const izinEl = document.getElementById('tIzin');
            
            if (totalEl) totalEl.innerText = '0';
            if (hadirEl) hadirEl.innerText = '0';
            if (izinEl) izinEl.innerText = '0';
            
            container.style.display = 'flex'; 
            let dots = 0;
            
            if (this.interval) clearInterval(this.interval); 
            this.interval = setInterval(() => {
                dots = (dots % 3) + 1; 
                textElement.innerText = "Mencari data" + ".".repeat(dots);
            }, 400);
        },

        stop: function(containerId) {
            if (this.interval) {
                clearInterval(this.interval);
                this.interval = null;
            }
            const container = document.getElementById(containerId);
            if (container) container.style.display = 'none';
        },

        error: function(textId) {
            if (this.interval) {
                clearInterval(this.interval);
                this.interval = null;
            }
            const textElement = document.getElementById(textId);
            if (textElement) {
                textElement.innerText = "Gagal memuat data";
                textElement.style.color = "#ff4d4d"; 
            }
        }
    };

    function setFilter(type) {
        if (isFetching) return;
        filterType = type;
        
        document.getElementById('btnToday').classList.toggle('active', type === 'today');
        document.getElementById('btnAll').classList.toggle('active', type === 'all');
        
        fetchData(true);
    }

    async function fetchData(isManual = false) {
        if (isFetching && !isManual) return;
        isFetching = true;

        const textId = 'loading-text';
        const containerId = 'loading';
        const tableBody = document.getElementById('tableBody');
        const startTime = Date.now();

        LoadingManager.start(textId, containerId);

        try {
            const response = await fetch(`${csvUrl}&v=${Date.now()}`);
            if (!response.ok) throw new Error('Network error');
            
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1).filter(r => r.trim() !== "").reverse();
            
            const now = new Date();
            const day = now.getDate();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();
            
            const format1 = `${day}/${month}/${year}`;
            const format2 = `${String(day).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;

            let html = '', h = 0, i = 0, t = 0;

            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (c.length < 5) return;

                const timestampFull = c[0]; 
                const nama = c[1];
                const status = c[4];

                const parts = timestampFull.split(' ');
                const dateOnly = parts[0];
                let timeOnly = parts[1] ? parts[1].substring(0, 8).trim() : "--:--:--"; 
                if (timeOnly.endsWith(':')) timeOnly = timeOnly.slice(0, -1);
                
                const isToday = (dateOnly === format1 || dateOnly === format2);
                if (filterType === 'today' && !isToday) return;

                t++;
                const isIzin = status.toLowerCase() === 'izin';
                if (isIzin) i++; else h++;

                html += `<tr>
                    <td>
                        <div class="time-wrapper">
                            <span class="hour-text">${timeOnly}</span>
                            <span class="date-text">${dateOnly}</span>
                        </div>
                    </td>
                    <td><span class="name-text">${nama}</span></td>
                    <td style="text-align:right;">
                        <span class="badge ${isIzin ? 'bg-izin' : 'bg-hadir'}">${status}</span>
                    </td>
                </tr>`;
            });

            const fetchDuration = Date.now() - startTime;
            const minimumShowTime = 1300; 
            const remainingDelay = Math.max(0, minimumShowTime - fetchDuration);

            setTimeout(() => {
                tableBody.innerHTML = html || '<tr><td colspan="3" style="text-align:center; padding:30px; color:#aaa;">Belum ada data.</td></tr>';
                
                document.getElementById('total').innerText = t;
                document.getElementById('tHadir').innerText = h;
                document.getElementById('tIzin').innerText = i;

                LoadingManager.stop(containerId);
                isFetching = false;
            }, remainingDelay);

        } catch (e) {
            console.error("Gagal sinkronisasi data:", e);
            LoadingManager.error(textId);
            isFetching = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
    });
    
    setInterval(() => {
        if (!isFetching) fetchData();
    }, 15000);
</script>

<script>
const updateEnd = new Date("2026-05-02T06:00:00");
const now = new Date();

if (now <= updateEnd) {
    document.body.innerHTML = `
    <img src="https://i.ibb.co.com/m57drpHX/fotolivexjj.jpg" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    " alt="background">

    <div style="
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4); /* Kegelapan latar belakang */
        z-index: 2;
    "></div>

    <div id="update-container" style="
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'Poppins', sans-serif;
        color:white;
        z-index: 3;
        overflow:hidden;
    ">
        <style>
            @keyframes fadeIn { from { opacity:0; transform:scale(1.05); } to { opacity:1; transform:scale(1); } }
            @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
            @keyframes glow { 0% { box-shadow:0 0 20px rgba(255,0,0,0.3); } 100% { box-shadow:0 0 60px rgba(255,0,0,0.7); } }
            @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        </style>

        <div style="
            position:relative;
            background:rgba(20, 20, 20, 0.3);
            backdrop-filter:blur(3px);
            -webkit-backdrop-filter:blur(3px);
            border:1px solid rgba(255,0,0,0.4);
            padding:2.8rem 2rem;
            border-radius:25px;
            text-align:center;
            max-width:420px;
            width:90%;
            animation: float 3s ease-in-out infinite alternate, glow 2s ease-in-out infinite alternate;
        ">
            <div style="display:flex; justify-content:center; margin-bottom:15px;">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ff2b2b" stroke-width="2" style="animation:spin 4s linear infinite; filter:drop-shadow(0 0 10px red);">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </div>
            
            <h1 id="title" style="font-size: 1.8rem; font-weight: 900; color: #ff2b2b; text-shadow: 0 0 15px rgba(255,0,0,0.9); margin-bottom: 10px; letter-spacing: 1px; white-space: nowrap;">
                UPDATE SYSTEM
            </h1>

            <p style="color:#bbb; font-size:0.95rem; margin:20px auto; line-height:1.6; text-align:left; max-width:320px;">
                <span style="display:block; text-align:center;">
                    Sistem sedang diperbarui<br>
                    Mohon tunggu sampai selesai<br>
                    <b id="endDate" style="color:#ff4d4d;"></b>
                </span>
                <br>
                <b style="color:#ff4d4d;">New Features</b><br>
                • Penambahan cek absensi
            </p>

<div id="countdown" style="
    font-weight:700; 
    font-size:1.1rem; 
    color:#ff4d4d; 
    background:rgba(255,0,0,0.12); 
    padding:12px 22px; 
    border-radius:50px; 
    display:inline-block; 
    letter-spacing:1px;
    white-space: nowrap; /* Mencegah teks turun ke bawah */
    min-width: 200px;    /* Memberikan lebar minimum agar box tidak kembang kempis */
    text-align: center;  /* Memastikan teks tetap di tengah */
">
    Loading...
</div>

        </div>
    </div>
    `;

    // LOCK SCROLL
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";

    // FORMAT TANGGAL
    const options = { day:'numeric', month:'long', year:'numeric' };
    document.getElementById("endDate").innerText = updateEnd.toLocaleDateString('id-ID', options);

    // COUNTDOWN
    function updateCountdown() {
        const distance = updateEnd - new Date().getTime();
        if (distance <= 0) { location.reload(); return; }

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const m = Math.floor((distance / (1000 * 60)) % 60);
        const s = Math.floor((distance / 1000) % 60);

        let result = d > 0 ? `${d} Day ` : "";
        result += (d > 0 || h > 0) ? `${h} Hours ` : "";
        result += (d > 0 || h > 0 || m > 0) ? `${m} Minutes ` : "";
        result += `${s} Seccond`;
        document.getElementById("countdown").innerHTML = result;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // TITLE DOT ANIMATION
    let dotCount = 0;
    setInterval(() => {
        document.getElementById("title").innerText = "UPDATE SYSTEM" + ".".repeat(dotCount);
        dotCount = (dotCount + 1) % 4;
    }, 500);
}
</script>
</body> 
</html>
